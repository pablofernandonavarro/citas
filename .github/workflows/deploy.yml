name: Tests y Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Copiar .env
        run: cp .env.example .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Instalar dependencias JS y compilar assets
        run: npm ci && npm run build

      - name: Generar clave
        run: php artisan key:generate

      - name: Crear base de datos SQLite
        run: touch database/database.sqlite

      - name: Ejecutar migraciones
        run: php artisan migrate --force

      - name: Ejecutar tests
        run: php artisan test

  deploy:
    name: Deploy
    needs: tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ ! -d "${{ secrets.SSH_PATH }}/.git" ]; then
              git clone https://github.com/pablofernandonavarro/citas.git ${{ secrets.SSH_PATH }}
            fi
            cd ${{ secrets.SSH_PATH }}
            git remote set-url origin https://github.com/pablofernandonavarro/citas.git
            git pull origin main
            composer install --no-dev --no-interaction --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart
